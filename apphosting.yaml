# App Hosting Configuration
# https://firebase.google.com/docs/app-hosting/configure

# The settings for the App Hosting environment.
runConfig:
  minInstances: 0
  maxInstances: 100
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables to pass to the build and runtime.
env:
  - variable: APP_URL
    value: "https://pulsewireafrica-152570020464.us-west2.run.app"
    availability:
      - RUNTIME
      - BUILD
